<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <rect width="560" height="320" fill="#0e1a2e"/>
  <!-- Booking Table -->
  <rect x="30" y="20" width="500" height="180" rx="8" fill="#162240"/>
  <text x="280" y="14" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">Reservations Dashboard</text>
  <!-- Table header -->
  <rect x="40" y="30" width="480" height="28" rx="4" fill="#1d2e50"/>
  <text x="80" y="49" fill="#8899bb" font-family="system-ui" font-size="11" font-weight="bold">PNR</text>
  <text x="160" y="49" fill="#8899bb" font-family="system-ui" font-size="11" font-weight="bold">Passenger</text>
  <text x="270" y="49" fill="#8899bb" font-family="system-ui" font-size="11" font-weight="bold">Route</text>
  <text x="380" y="49" fill="#8899bb" font-family="system-ui" font-size="11" font-weight="bold">Seat</text>
  <text x="460" y="49" fill="#8899bb" font-family="system-ui" font-size="11" font-weight="bold">Status</text>
  <!-- Row 1 -->
  <text x="80" y="80" fill="#ccd" font-family="system-ui" font-size="11">PNR-4201</text>
  <text x="160" y="80" fill="#ccd" font-family="system-ui" font-size="11">A. Kumar</text>
  <text x="270" y="80" fill="#ccd" font-family="system-ui" font-size="11">DEL → MUM</text>
  <text x="380" y="80" fill="#ccd" font-family="system-ui" font-size="11">A1-24</text>
  <rect x="440" y="68" width="70" height="20" rx="10" fill="#0e4429"/>
  <text x="475" y="82" text-anchor="middle" fill="#3fb950" font-family="system-ui" font-size="10">Confirmed</text>
  <!-- Row 2 -->
  <text x="80" y="110" fill="#ccd" font-family="system-ui" font-size="11">PNR-4202</text>
  <text x="160" y="110" fill="#ccd" font-family="system-ui" font-size="11">S. Patel</text>
  <text x="270" y="110" fill="#ccd" font-family="system-ui" font-size="11">BLR → HYD</text>
  <text x="380" y="110" fill="#ccd" font-family="system-ui" font-size="11">B2-08</text>
  <rect x="440" y="98" width="70" height="20" rx="10" fill="#0e4429"/>
  <text x="475" y="112" text-anchor="middle" fill="#3fb950" font-family="system-ui" font-size="10">Confirmed</text>
  <!-- Row 3 -->
  <text x="80" y="140" fill="#ccd" font-family="system-ui" font-size="11">PNR-4203</text>
  <text x="160" y="140" fill="#ccd" font-family="system-ui" font-size="11">R. Singh</text>
  <text x="270" y="140" fill="#ccd" font-family="system-ui" font-size="11">JPN → CCU</text>
  <text x="380" y="140" fill="#ccd" font-family="system-ui" font-size="11">C1-15</text>
  <rect x="440" y="128" width="70" height="20" rx="10" fill="#4a2e12"/>
  <text x="475" y="142" text-anchor="middle" fill="#f0a030" font-family="system-ui" font-size="10">Waitlist</text>
  <!-- Row 4 -->
  <text x="80" y="170" fill="#ccd" font-family="system-ui" font-size="11">PNR-4204</text>
  <text x="160" y="170" fill="#ccd" font-family="system-ui" font-size="11">M. Gupta</text>
  <text x="270" y="170" fill="#ccd" font-family="system-ui" font-size="11">LKO → DEL</text>
  <text x="380" y="170" fill="#ccd" font-family="system-ui" font-size="11">A3-02</text>
  <rect x="440" y="158" width="70" height="20" rx="10" fill="#0e4429"/>
  <text x="475" y="172" text-anchor="middle" fill="#3fb950" font-family="system-ui" font-size="10">Confirmed</text>
  <!-- SQL terminal -->
  <rect x="30" y="215" width="500" height="90" rx="8" fill="#0a0e18"/>
  <text x="45" y="235" fill="#3fb950" font-family="monospace" font-size="11">mysql&gt;</text>
  <text x="95" y="235" fill="#66aaff" font-family="monospace" font-size="11">SELECT</text>
  <text x="145" y="235" fill="#ccd" font-family="monospace" font-size="11">* FROM reservations</text>
  <text x="95" y="255" fill="#66aaff" font-family="monospace" font-size="11">WHERE</text>
  <text x="140" y="255" fill="#ccd" font-family="monospace" font-size="11">status = &apos;confirmed&apos;</text>
  <text x="95" y="275" fill="#66aaff" font-family="monospace" font-size="11">ORDER BY</text>
  <text x="170" y="275" fill="#ccd" font-family="monospace" font-size="11">departure_date ASC;</text>
  <text x="45" y="295" fill="#3fb950" font-family="monospace" font-size="11">4 rows returned</text>
</svg>

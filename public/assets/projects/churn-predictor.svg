<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <rect width="560" height="320" fill="#0f1729"/>
  <!-- Confusion Matrix -->
  <rect x="40" y="40" width="200" height="200" rx="8" fill="#1a2744"/>
  <text x="140" y="30" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">Confusion Matrix</text>
  <rect x="50" y="50" width="90" height="90" fill="#1e4d8e" rx="4"/>
  <text x="95" y="100" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="20" font-weight="bold">847</text>
  <rect x="145" y="50" width="90" height="90" fill="#2a3a5c" rx="4"/>
  <text x="190" y="100" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="20">23</text>
  <rect x="50" y="145" width="90" height="90" fill="#2a3a5c" rx="4"/>
  <text x="95" y="195" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="20">56</text>
  <rect x="145" y="145" width="90" height="90" fill="#0071e3" rx="4"/>
  <text x="190" y="195" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="20" font-weight="bold">412</text>
  <!-- ROC Curve -->
  <rect x="280" y="40" width="240" height="200" rx="8" fill="#1a2744"/>
  <text x="400" y="30" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">ROC Curve</text>
  <line x1="300" y1="220" x2="500" y2="220" stroke="#334466" stroke-width="1"/>
  <line x1="300" y1="220" x2="300" y2="60" stroke="#334466" stroke-width="1"/>
  <line x1="300" y1="220" x2="500" y2="60" stroke="#334466" stroke-width="1" stroke-dasharray="4"/>
  <path d="M300,220 Q320,200 340,160 Q380,80 440,70 Q480,65 500,60" stroke="#0071e3" stroke-width="2.5" fill="none"/>
  <text x="400" y="250" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="11">AUC = 0.94</text>
  <!-- Feature Importance bars -->
  <rect x="40" y="265" width="480" height="40" rx="6" fill="#1a2744"/>
  <rect x="50" y="272" width="180" height="8" rx="4" fill="#0071e3"/>
  <rect x="50" y="290" width="130" height="8" rx="4" fill="#3d8ef7"/>
  <text x="240" y="280" fill="#8899bb" font-family="system-ui" font-size="10">tenure</text>
  <text x="190" y="298" fill="#8899bb" font-family="system-ui" font-size="10">charges</text>
  <rect x="300" y="272" width="100" height="8" rx="4" fill="#5aa3f9"/>
  <rect x="300" y="290" width="70" height="8" rx="4" fill="#7ab8fb"/>
  <text x="410" y="280" fill="#8899bb" font-family="system-ui" font-size="10">contract</text>
  <text x="380" y="298" fill="#8899bb" font-family="system-ui" font-size="10">support</text>
</svg>

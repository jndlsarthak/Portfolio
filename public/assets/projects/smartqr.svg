<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <rect width="560" height="320" fill="#111827"/>
  <!-- QR Code Grid -->
  <rect x="40" y="30" width="130" height="130" rx="8" fill="#1e2940"/>
  <rect x="55" y="45" width="100" height="100" fill="#fff" rx="4"/>
  <rect x="62" y="52" width="20" height="20" fill="#111827"/>
  <rect x="62" y="52" width="14" height="14" fill="#111827" rx="2"/>
  <rect x="65" y="55" width="8" height="8" fill="#111827"/>
  <rect x="118" y="52" width="20" height="20" fill="#111827"/>
  <rect x="121" y="55" width="14" height="14" fill="#111827" rx="2"/>
  <rect x="62" y="118" width="20" height="20" fill="#111827"/>
  <rect x="65" y="121" width="14" height="14" fill="#111827" rx="2"/>
  <!-- QR pattern dots -->
  <rect x="90" y="75" width="6" height="6" fill="#111827"/>
  <rect x="100" y="75" width="6" height="6" fill="#111827"/>
  <rect x="110" y="85" width="6" height="6" fill="#111827"/>
  <rect x="85" y="95" width="6" height="6" fill="#111827"/>
  <rect x="95" y="105" width="6" height="6" fill="#111827"/>
  <rect x="105" y="95" width="6" height="6" fill="#111827"/>
  <rect x="115" y="105" width="6" height="6" fill="#111827"/>
  <rect x="90" y="115" width="6" height="6" fill="#111827"/>
  <rect x="100" y="85" width="6" height="6" fill="#111827"/>
  <!-- More QR codes -->
  <rect x="200" y="30" width="130" height="130" rx="8" fill="#1e2940"/>
  <rect x="215" y="45" width="100" height="100" fill="#fff" rx="4"/>
  <rect x="222" y="52" width="20" height="20" fill="#0071e3"/>
  <rect x="298" y="52" width="20" height="20" fill="#0071e3"/>
  <rect x="222" y="118" width="20" height="20" fill="#0071e3"/>
  <rect x="250" y="75" width="6" height="6" fill="#0071e3"/>
  <rect x="260" y="85" width="6" height="6" fill="#0071e3"/>
  <rect x="270" y="75" width="6" height="6" fill="#0071e3"/>
  <rect x="280" y="95" width="6" height="6" fill="#0071e3"/>
  <rect x="250" y="105" width="6" height="6" fill="#0071e3"/>
  <rect x="270" y="105" width="6" height="6" fill="#0071e3"/>
  <!-- Customization panel -->
  <rect x="370" y="30" width="160" height="260" rx="8" fill="#1e2940"/>
  <text x="450" y="55" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13" font-weight="bold">Settings</text>
  <text x="390" y="80" fill="#8899bb" font-family="system-ui" font-size="11">Content</text>
  <rect x="390" y="88" width="120" height="24" rx="4" fill="#0f1729"/>
  <text x="400" y="105" fill="#6688aa" font-family="system-ui" font-size="10">https://example.com</text>
  <text x="390" y="130" fill="#8899bb" font-family="system-ui" font-size="11">Size</text>
  <rect x="390" y="138" width="120" height="6" rx="3" fill="#0f1729"/>
  <circle cx="460" cy="141" r="6" fill="#0071e3"/>
  <text x="390" y="170" fill="#8899bb" font-family="system-ui" font-size="11">Color</text>
  <circle cx="400" cy="185" r="10" fill="#111827"/>
  <circle cx="425" cy="185" r="10" fill="#0071e3"/>
  <circle cx="450" cy="185" r="10" fill="#e63946"/>
  <circle cx="475" cy="185" r="10" fill="#2a9d8f"/>
  <rect x="390" y="210" width="120" height="30" rx="15" fill="#0071e3"/>
  <text x="450" y="230" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">Generate</text>
  <!-- Python terminal -->
  <rect x="40" y="180" width="290" height="110" rx="8" fill="#0a0e18"/>
  <text x="55" y="200" fill="#3fb950" font-family="monospace" font-size="11">$</text>
  <text x="70" y="200" fill="#ccd" font-family="monospace" font-size="11">python smartqr.py --url example.com</text>
  <text x="55" y="220" fill="#6688aa" font-family="monospace" font-size="11">Generating QR code...</text>
  <text x="55" y="240" fill="#6688aa" font-family="monospace" font-size="11">Applying customization...</text>
  <text x="55" y="260" fill="#3fb950" font-family="monospace" font-size="11">✓ QR code saved to output/qr_001.png</text>
  <text x="55" y="280" fill="#3fb950" font-family="monospace" font-size="11">$</text>
</svg>

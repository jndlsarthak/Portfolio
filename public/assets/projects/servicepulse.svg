<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <rect width="560" height="320" fill="#0d1b2a"/>
  <!-- Toronto Map silhouette with heat zones -->
  <rect x="30" y="30" width="300" height="240" rx="8" fill="#1b2838"/>
  <text x="180" y="22" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">Toronto Ward Map</text>
  <circle cx="120" cy="120" r="40" fill="#e63946" opacity="0.35"/>
  <circle cx="180" cy="150" r="55" fill="#e63946" opacity="0.25"/>
  <circle cx="230" cy="100" r="30" fill="#f4a261" opacity="0.4"/>
  <circle cx="150" cy="180" r="35" fill="#f4a261" opacity="0.3"/>
  <circle cx="100" cy="200" r="25" fill="#2a9d8f" opacity="0.3"/>
  <circle cx="250" cy="180" r="28" fill="#e63946" opacity="0.2"/>
  <!-- Grid lines for map -->
  <line x1="30" y1="90" x2="330" y2="90" stroke="#2a3a5c" stroke-width="0.5"/>
  <line x1="30" y1="150" x2="330" y2="150" stroke="#2a3a5c" stroke-width="0.5"/>
  <line x1="30" y1="210" x2="330" y2="210" stroke="#2a3a5c" stroke-width="0.5"/>
  <line x1="130" y1="30" x2="130" y2="270" stroke="#2a3a5c" stroke-width="0.5"/>
  <line x1="230" y1="30" x2="230" y2="270" stroke="#2a3a5c" stroke-width="0.5"/>
  <!-- Bar chart -->
  <rect x="360" y="30" width="170" height="240" rx="8" fill="#1b2838"/>
  <text x="445" y="22" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">Response Times</text>
  <rect x="380" y="80" width="25" height="140" rx="4" fill="#2a9d8f"/>
  <rect x="415" y="110" width="25" height="110" rx="4" fill="#e9c46a"/>
  <rect x="450" y="60" width="25" height="160" rx="4" fill="#e63946"/>
  <rect x="485" y="130" width="25" height="90" rx="4" fill="#264653"/>
  <text x="392" y="240" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="9">W1</text>
  <text x="427" y="240" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="9">W2</text>
  <text x="462" y="240" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="9">W3</text>
  <text x="497" y="240" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="9">W4</text>
  <!-- Stats bar -->
  <rect x="30" y="280" width="500" height="30" rx="6" fill="#1b2838"/>
  <text x="110" y="300" text-anchor="middle" fill="#2a9d8f" font-family="system-ui" font-size="11" font-weight="bold">400k+ Records</text>
  <text x="290" y="300" text-anchor="middle" fill="#e9c46a" font-family="system-ui" font-size="11" font-weight="bold">25 Wards</text>
  <text x="450" y="300" text-anchor="middle" fill="#e63946" font-family="system-ui" font-size="11" font-weight="bold">Tableau Dashboard</text>
</svg>

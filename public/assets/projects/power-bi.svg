<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <rect width="560" height="320" fill="#f0f2f5"/>
  <!-- KPI Tiles -->
  <rect x="30" y="20" width="120" height="70" rx="8" fill="#fff" stroke="#e1e5ea" stroke-width="1"/>
  <text x="90" y="45" text-anchor="middle" fill="#6e6e73" font-family="system-ui" font-size="10">Revenue</text>
  <text x="90" y="72" text-anchor="middle" fill="#1d1d1f" font-family="system-ui" font-size="22" font-weight="bold">$2.4M</text>
  <rect x="165" y="20" width="120" height="70" rx="8" fill="#fff" stroke="#e1e5ea" stroke-width="1"/>
  <text x="225" y="45" text-anchor="middle" fill="#6e6e73" font-family="system-ui" font-size="10">Customers</text>
  <text x="225" y="72" text-anchor="middle" fill="#1d1d1f" font-family="system-ui" font-size="22" font-weight="bold">18.2K</text>
  <rect x="300" y="20" width="120" height="70" rx="8" fill="#fff" stroke="#e1e5ea" stroke-width="1"/>
  <text x="360" y="45" text-anchor="middle" fill="#6e6e73" font-family="system-ui" font-size="10">Growth</text>
  <text x="360" y="72" text-anchor="middle" fill="#2a9d8f" font-family="system-ui" font-size="22" font-weight="bold">+24%</text>
  <rect x="435" y="20" width="100" height="70" rx="8" fill="#fff" stroke="#e1e5ea" stroke-width="1"/>
  <text x="485" y="45" text-anchor="middle" fill="#6e6e73" font-family="system-ui" font-size="10">Avg Order</text>
  <text x="485" y="72" text-anchor="middle" fill="#1d1d1f" font-family="system-ui" font-size="22" font-weight="bold">$132</text>
  <!-- Bar Graph -->
  <rect x="30" y="105" width="250" height="195" rx="8" fill="#fff" stroke="#e1e5ea" stroke-width="1"/>
  <text x="155" y="125" text-anchor="middle" fill="#1d1d1f" font-family="system-ui" font-size="12" font-weight="bold">Monthly Sales</text>
  <rect x="55" y="160" width="28" height="100" rx="4" fill="#0071e3"/>
  <rect x="95" y="180" width="28" height="80" rx="4" fill="#3d8ef7"/>
  <rect x="135" y="145" width="28" height="115" rx="4" fill="#0071e3"/>
  <rect x="175" y="170" width="28" height="90" rx="4" fill="#3d8ef7"/>
  <rect x="215" y="150" width="28" height="110" rx="4" fill="#0071e3"/>
  <text x="69" y="275" text-anchor="middle" fill="#86868b" font-family="system-ui" font-size="9">Jan</text>
  <text x="109" y="275" text-anchor="middle" fill="#86868b" font-family="system-ui" font-size="9">Feb</text>
  <text x="149" y="275" text-anchor="middle" fill="#86868b" font-family="system-ui" font-size="9">Mar</text>
  <text x="189" y="275" text-anchor="middle" fill="#86868b" font-family="system-ui" font-size="9">Apr</text>
  <text x="229" y="275" text-anchor="middle" fill="#86868b" font-family="system-ui" font-size="9">May</text>
  <!-- Donut Chart -->
  <rect x="300" y="105" width="235" height="195" rx="8" fill="#fff" stroke="#e1e5ea" stroke-width="1"/>
  <text x="417" y="125" text-anchor="middle" fill="#1d1d1f" font-family="system-ui" font-size="12" font-weight="bold">Revenue by Category</text>
  <circle cx="400" cy="210" r="55" stroke="#0071e3" stroke-width="18" fill="none" stroke-dasharray="120 346"/>
  <circle cx="400" cy="210" r="55" stroke="#3d8ef7" stroke-width="18" fill="none" stroke-dasharray="90 346" stroke-dashoffset="-120"/>
  <circle cx="400" cy="210" r="55" stroke="#7ab8fb" stroke-width="18" fill="none" stroke-dasharray="70 346" stroke-dashoffset="-210"/>
  <circle cx="400" cy="210" r="55" stroke="#b5d8fd" stroke-width="18" fill="none" stroke-dasharray="66 346" stroke-dashoffset="-280"/>
  <text x="400" y="215" text-anchor="middle" fill="#1d1d1f" font-family="system-ui" font-size="16" font-weight="bold">100%</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none">
  <rect width="560" height="320" fill="#0a1628"/>
  <!-- Scatter plot with regression line -->
  <rect x="30" y="20" width="320" height="250" rx="8" fill="#132040"/>
  <text x="190" y="14" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">Price vs. Features</text>
  <line x1="50" y1="250" x2="330" y2="250" stroke="#2a3a5c" stroke-width="1"/>
  <line x1="50" y1="250" x2="50" y2="40" stroke="#2a3a5c" stroke-width="1"/>
  <!-- Data points -->
  <circle cx="80" cy="220" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="100" cy="200" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="120" cy="210" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="140" cy="180" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="160" cy="170" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="180" cy="150" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="200" cy="140" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="220" cy="120" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="240" cy="130" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="260" cy="100" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="280" cy="90" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="300" cy="70" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="110" cy="195" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="190" cy="155" r="4" fill="#0071e3" opacity="0.6"/>
  <circle cx="250" cy="110" r="4" fill="#0071e3" opacity="0.6"/>
  <!-- Regression line -->
  <line x1="60" y1="230" x2="320" y2="55" stroke="#e63946" stroke-width="2" stroke-dasharray="6"/>
  <!-- R² metric -->
  <rect x="380" y="20" width="150" height="80" rx="8" fill="#132040"/>
  <text x="455" y="50" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">R² Score</text>
  <text x="455" y="82" text-anchor="middle" fill="#0071e3" font-family="system-ui" font-size="32" font-weight="bold">0.77</text>
  <!-- MAE metric -->
  <rect x="380" y="115" width="150" height="70" rx="8" fill="#132040"/>
  <text x="455" y="140" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="12">MAE Improvement</text>
  <text x="455" y="170" text-anchor="middle" fill="#2a9d8f" font-family="system-ui" font-size="24" font-weight="bold">↓ 18%</text>
  <!-- Property cards -->
  <rect x="380" y="200" width="150" height="85" rx="8" fill="#132040"/>
  <text x="455" y="225" text-anchor="middle" fill="#8899bb" font-family="system-ui" font-size="11">XGBoost + GridSearchCV</text>
  <text x="455" y="248" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="10">Geospatial Features</text>
  <text x="455" y="268" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="10">Cross-Validation</text>
  <!-- Bottom label -->
  <rect x="30" y="285" width="500" height="25" rx="6" fill="#132040"/>
  <text x="280" y="302" text-anchor="middle" fill="#6688aa" font-family="system-ui" font-size="11">Real Estate Price Prediction Pipeline</text>
</svg>
